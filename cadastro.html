<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - NVR Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/pages.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script>if(localStorage.getItem('nvr-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema" style="position:fixed;top:var(--space-6);right:var(--space-6);z-index:999;">
        <i class="bi bi-sun-fill theme-toggle__icon--light"></i>
        <i class="bi bi-moon-fill theme-toggle__icon--dark"></i>
    </button>

    <main class="auth-layout">
        <section class="auth-panel auth-form-panel">
            <div class="auth-form-panel__inner">
                <a href="index.html" class="auth-logo">
                    <img src="assets/images/logo.svg" alt="NVR Sports" class="auth-logo__img">
                </a>

                <div class="auth-form-panel__header">
                    <h1 class="auth-form-panel__title">Crie sua conta</h1>
                    <p class="auth-form-panel__subtitle">Comece a correr com a comunidade NVR Sports</p>
                </div>

                <form class="auth-form" data-validate action="#" method="POST">
                    <div class="form-group form-floating">
                        <input type="text" id="signup-name" name="name" class="form-input" placeholder="Nome completo" required>
                        <label for="signup-name" class="form-label">Nome completo</label>
                        <span class="form-input-icon">
                            <i class="bi bi-person"></i>
                        </span>
                    </div>

                    <div class="form-group form-floating">
                        <input type="email" id="signup-email" name="email" class="form-input" placeholder="E-mail" required>
                        <label for="signup-email" class="form-label">E-mail</label>
                        <span class="form-input-icon">
                            <i class="bi bi-envelope"></i>
                        </span>
                    </div>

                    <div class="form-group form-floating">
                        <input type="text" id="signup-cpf" name="cpf" class="form-input" placeholder="CPF" data-mask-cpf required>
                        <label for="signup-cpf" class="form-label">CPF</label>
                        <span class="form-input-icon">
                            <i class="bi bi-card-text"></i>
                        </span>
                    </div>

                    <div class="form-group form-floating">
                        <input type="tel" id="signup-phone" name="phone" class="form-input" placeholder="Telefone" data-mask-phone required>
                        <label for="signup-phone" class="form-label">Telefone</label>
                        <span class="form-input-icon">
                            <i class="bi bi-telephone"></i>
                        </span>
                    </div>

                    <div class="form-group form-floating">
                        <input type="password" id="signup-password" name="password" class="form-input" placeholder="Senha" data-password-strength required>
                        <label for="signup-password" class="form-label">Senha</label>
                        <span class="form-input-icon">
                            <i class="bi bi-lock"></i>
                        </span>
                        <button type="button" class="form-input-action" data-toggle-password="signup-password" aria-label="Mostrar senha">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="password-strength" data-password-strength-indicator>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <div class="password-strength__bar"></div>
                        <span class="password-strength__text"></span>
                    </div>

                    <div class="form-group form-floating">
                        <input type="password" id="signup-confirm-password" name="confirm_password" class="form-input" placeholder="Confirmar senha" required>
                        <label for="signup-confirm-password" class="form-label">Confirmar senha</label>
                        <span class="form-input-icon">
                            <i class="bi bi-lock"></i>
                        </span>
                        <button type="button" class="form-input-action" data-toggle-password="signup-confirm-password" aria-label="Mostrar senha">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="form-group form-group--checkbox">
                        <label class="form-checkbox">
                            <input type="checkbox" id="signup-terms" name="terms" required>
                            <span class="form-checkbox__check">
                                <i class="bi bi-check-lg"></i>
                            </span>
                            <span class="form-checkbox__text">
                                Li e aceito os <a href="termos.html" class="form-link" target="_blank">Termos de Uso</a> e a <a href="privacidade.html" class="form-link" target="_blank">Política de Privacidade</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn--primary btn--full">
                        Criar Conta
                    </button>
                </form>

                <div class="auth-divider">
                    <span>ou</span>
                </div>

                <div class="auth-social">
                    <button type="button" class="btn btn--social btn--social-google">
                        <i class="bi bi-google"></i>
                        Cadastrar com Google
                    </button>
                    <button type="button" class="btn btn--social btn--social-apple">
                        <i class="bi bi-apple"></i>
                        Cadastrar com Apple
                    </button>
                </div>

                <p class="auth-form-panel__footer">
                    Já tem conta? <a href="login.html" class="form-link form-link--bold">Entre</a>
                </p>
            </div>
        </section>

        <section class="auth-panel auth-visual">
            <div class="auth-visual__pattern"></div>
            <div class="auth-visual__content">
                <div class="auth-visual__icon">
                    <i class="bi bi-trophy"></i>
                </div>
                <h2 class="auth-visual__title">Junte-se a milhares de atletas.</h2>
                <p class="auth-visual__text">
                    Crie sua conta e tenha acesso a provas exclusivas, 
                    ranking nacional e uma comunidade que compartilha 
                    a mesma paixão por corrida.
                </p>
                <div class="auth-visual__stats">
                    <div class="auth-visual__stat">
                        <span class="auth-visual__stat-number">50k+</span>
                        <span class="auth-visual__stat-label">Corredores</span>
                    </div>
                    <div class="auth-visual__stat">
                        <span class="auth-visual__stat-number">200+</span>
                        <span class="auth-visual__stat-label">Cidades</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
